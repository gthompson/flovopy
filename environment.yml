name: flovopy_core
channels:
  - conda-forge
dependencies:
  # ---------------------------------------------------------------------------
  # Python and packaging
  # ---------------------------------------------------------------------------
  - python=3.12
  - pip
  - setuptools
  - packaging
  - pyyaml

  # ---------------------------------------------------------------------------
  # Core scientific stack
  # Essential numerical + data handling tools
  # ---------------------------------------------------------------------------
  - numpy
  - scipy
  - pandas
  - matplotlib

  # ---------------------------------------------------------------------------
  # Seismology
  # Primary dependency for waveform processing
  # ---------------------------------------------------------------------------
  - obspy=1.5.*

  # ---------------------------------------------------------------------------
  # Jupyter (for teaching + notebooks)
  # ---------------------------------------------------------------------------
  - jupyterlab
  - ipykernel

  # ---------------------------------------------------------------------------
  # Utilities (lightweight, widely useful)
  # ---------------------------------------------------------------------------
  - tqdm
